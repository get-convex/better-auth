name: Test and lint
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

permissions: {}

jobs:
  check:
    name: Test and lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Node setup
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          cache-dependency-path: package.json
          node-version: "24.x"
          cache: "npm"

      - name: Install and build
        run: |
          npm i --min-release-age=0
          npm run build
      - name: Install example dependencies
        run: |
          cd examples/next && npm i &
          cd examples/react && npm i &
          cd examples/tanstack && npm i &
          wait
      - name: Publish package for testing branch
        run:
          npx pkg-pr-new publish || echo "Have you set up pkg-pr-new for this
          repo?"
      - name: Test
        run: |
          npm run test
          npm run typecheck
          npm run lint
      - name: Install e2e dependencies
        run: cd e2e && npm i
      - name: Install Playwright browsers
        run: cd e2e && npx playwright install --with-deps chromium
      - name: Run e2e tests
        run: cd e2e && npm run test
